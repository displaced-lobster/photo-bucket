name = "photo-bucket"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "photos"
remote = true

[vars]
# Public base URL for images (your R2 public domain or custom domain)
PHOTOS_BASE_URL = "https://photo-bucket.richardmills.ca"

[dev]
port = 8787
